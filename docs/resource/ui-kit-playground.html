<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Kit Playground — 컴포넌트 & 다이얼로그 통합 (74)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f17; --panel:#0f1521; --panel2:#121a28; --border:#1e2838;
  --text:#e8edf5; --dim:#8b97aa; --accent:#f59e0b; --accent2:#60a5fa; --ok:#34d399;
}
html,body{height:100%}
body{font-family:'Inter','Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.uk-app{display:grid;grid-template-columns:300px 1fr;height:100vh}

/* sidebar */
.uk-side{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
.uk-brand{padding:20px 22px 14px}
.uk-brand h1{font-size:18px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.uk-brand h1 .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#ff9f43)}
.uk-brand p{font-size:11px;color:var(--dim);margin-top:5px;font-family:'JetBrains Mono',monospace}
.uk-searchwrap{padding:4px 16px 12px}
.uk-searchwrap input{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:9px 12px;outline:none;font-family:inherit}
.uk-searchwrap input:focus{border-color:var(--accent2)}
.uk-searchwrap input::placeholder{color:#5b6677}
.uk-menu{flex:1;overflow-y:auto;padding:6px 10px 28px}
.uk-menu::-webkit-scrollbar{width:8px}
.uk-menu::-webkit-scrollbar-thumb{background:#243042;border-radius:8px}
.uk-group{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 12px 6px;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
.uk-group-tag{background:var(--border);color:var(--dim);border-radius:20px;padding:1px 8px;font-size:10px;font-family:'JetBrains Mono',monospace}
.uk-sub{padding:8px 12px 4px;font-size:10px;font-weight:600;letter-spacing:.04em;color:#5f6b7d}
.uk-item{display:flex;align-items:baseline;gap:8px;width:100%;text-align:left;background:none;border:0;border-radius:8px;color:var(--dim);padding:8px 12px;font-size:13.5px;cursor:pointer;font-family:inherit;border-left:2px solid transparent}
.uk-item:hover{background:var(--panel2);color:var(--text)}
.uk-item.active{background:rgba(245,158,11,.12);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.uk-item-ko{font-size:11px;color:#566173}
.uk-item.active .uk-item-ko{color:var(--accent)}

/* main */
.uk-main{overflow-y:auto;min-height:0;background:var(--bg)}
.uk-head{padding:30px 40px 0;max-width:1100px;margin:0 auto}
.uk-crumb{font-size:12px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:10px}
.uk-title-row{display:flex;align-items:baseline;gap:12px}
.uk-title-row h1{font-size:30px;font-weight:800;letter-spacing:-.02em}
.uk-title-ko{font-size:16px;color:var(--dim)}
.uk-desc{color:var(--dim);font-size:14.5px;line-height:1.65;margin-top:10px;max-width:760px}
.uk-deps{margin-top:12px;display:inline-block;font-size:11.5px;font-family:'JetBrains Mono',monospace;color:var(--accent2);background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);border-radius:6px;padding:4px 10px}
.uk-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.uk-btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:8px;cursor:pointer;font-family:inherit;transition:.15s}
.uk-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.uk-btn.primary{background:linear-gradient(135deg,var(--accent),#e08600);color:#1a1205;border-color:transparent}
.uk-btn.primary:hover{filter:brightness(1.08);color:#1a1205}

.uk-tabs{display:flex;gap:24px;padding:0 40px;margin:24px auto 0;max-width:1100px;border-bottom:1px solid var(--border)}
.uk-tab{background:none;border:0;border-bottom:2px solid transparent;color:var(--dim);font-size:13.5px;font-weight:600;padding:12px 2px;cursor:pointer;font-family:inherit;margin-bottom:-1px}
.uk-tab:hover{color:var(--text)}
.uk-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.uk-panels{padding:24px 40px 60px;max-width:1100px;margin:0 auto}
.uk-panel{display:none}
.uk-panel.active{display:block}
.uk-preview{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff}
.uk-frame{width:100%;height:480px;border:0;display:block;background:#fff}
.uk-code{position:relative;background:#0d1320;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.uk-code pre{margin:0;padding:20px 20px 22px;overflow-x:auto}
.uk-code code{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;color:#c9d4e3;white-space:pre}
.uk-copy{position:absolute;top:12px;right:12px;background:var(--panel2);border:1px solid var(--border);color:var(--dim);font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:inherit;z-index:2}
.uk-copy:hover{border-color:var(--accent2);color:var(--accent2)}
.uk-copy.ok{color:var(--ok);border-color:var(--ok)}

</style>
</head>
<body>
<div class="uk-app">
  <aside class="uk-side">
    <div class="uk-brand">
      <h1><span class="dot"></span> UI Kit Playground</h1>
      <p>74 components · copy &amp; paste ready</p>
    </div>
    <div class="uk-searchwrap">
      <input id="uk-search" type="search" placeholder="컴포넌트 검색 (한글/영문)…" autocomplete="off">
    </div>
    <nav class="uk-menu" id="uk-menu"></nav>
  </aside>
  <main class="uk-main"><div id="uk-view"></div></main>
</div>

<script id="data-catalog">const CATALOG = [
  { id: 'accordion', num: 1, name: 'Accordion', nameKo: '아코디언', cat: 'container',
    desc: '제목을 클릭하면 섹션이 펼쳐지거나 접히는 컴포넌트. 좁은 공간에 많은 정보를 단계적으로 노출할 수 있다.',
    usecase: 'FAQ · 상품 상세 설명 · 설정 메뉴',
    feature: '콘텐츠 토글 / 단계적 정보 노출 (Progressive Disclosure)',
    html: `<div class="accordion">
  <div class="accordion-item">
    <button class="accordion-header">결제는 어떻게 하나요?</button>
    <div class="accordion-body">신용카드, 계좌이체, 간편결제를 지원합니다.</div>
  </div>
  <div class="accordion-item">
    <button class="accordion-header">배송은 얼마나 걸리나요?</button>
    <div class="accordion-body">평일 오후 2시 이전 주문 시 당일 출고됩니다.</div>
  </div>
  <div class="accordion-item">
    <button class="accordion-header">환불 정책이 궁금합니다</button>
    <div class="accordion-body">수령 후 7일 이내 무료 반품 가능합니다.</div>
  </div>
</div>`,
    css: `.accordion-item { border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 6px; overflow: hidden; background: #fff; }
.accordion-header {
  width: 100%; text-align: left; background: #fff; border: none;
  padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
}
.accordion-header::after { content: '+'; color: #64748b; transition: transform .2s; }
.accordion-item.open .accordion-header::after { transform: rotate(45deg); }
.accordion-body { display: none; padding: 4px 14px 12px; color: #64748b; font-size: 12px; }
.accordion-item.open .accordion-body { display: block; }`,
    js: `document.querySelectorAll('.accordion-header').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.parentElement.classList.toggle('open');
  });
});` },

  { id: 'bento', num: 2, name: 'Bento Menu', nameKo: '벤토 메뉴', cat: 'nav',
    desc: '도시락(벤토) 칸막이처럼 격자 형태로 항목을 나열한 메뉴. 여러 앱/기능을 한 화면에 노출할 때 사용.',
    usecase: 'Google 앱 런처 · MS 365 앱 스위처',
    feature: '그리드 형태의 앱·기능 진입점 제공',
    html: `<div class="bento-wrap">
  <button class="bento-trigger" aria-label="앱 메뉴 열기">
    <span class="brow"><span class="bdot"></span><span class="bdot"></span><span class="bdot"></span></span>
    <span class="brow"><span class="bdot"></span><span class="bdot"></span><span class="bdot"></span></span>
    <span class="brow"><span class="bdot"></span><span class="bdot"></span><span class="bdot"></span></span>
  </button>
  <div class="bento-popover">
    <div class="bapp" title="메일">📧</div>
    <div class="bapp" title="캘린더">📅</div>
    <div class="bapp" title="드라이브">📁</div>
    <div class="bapp" title="문서">📝</div>
    <div class="bapp" title="채팅">💬</div>
    <div class="bapp" title="지도">🗺️</div>
  </div>
</div>`,
    css: `.bento-wrap { position: relative; display: inline-block; }
.bento-trigger {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 6px; cursor: pointer; display: flex; flex-direction: column; gap: 3px;
}
.bento-trigger .brow { display: flex; gap: 3px; }
.bento-trigger .bdot { width: 5px; height: 5px; background: #0f172a; border-radius: 1px; }
.bento-popover {
  display: none; position: absolute; background: #fff;
  border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px;
  box-shadow: 0 8px 24px rgba(15,23,42,.08);
  grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 6px; z-index: 10;
}
.bento-wrap.open .bento-popover { display: grid; }
.bento-popover .bapp {
  width: 48px; height: 48px; background: #f1f5f9; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer;
}
.bento-popover .bapp:hover { background: #e0e7ff; }`,
    js: `document.querySelectorAll('.bento-trigger').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    btn.parentElement.classList.toggle('open');
  });
});
document.addEventListener('click', () => {
  document.querySelectorAll('.bento-wrap.open').forEach(w => w.classList.remove('open'));
});` },

  { id: 'breadcrumb', num: 3, name: 'Breadcrumb', nameKo: '브레드크럼', cat: 'nav',
    desc: '사이트 계층 구조에서 현재 위치를 표시하고 상위 경로로 돌아갈 수 있게 하는 링크 경로.',
    usecase: '이커머스 카테고리 · 문서/위키 네비게이션',
    feature: '현재 위치 표시 / 상위 경로 역추적',
    html: `<nav class="breadcrumb" aria-label="breadcrumb">
  <a href="#">홈</a>
  <span class="sep">/</span>
  <a href="#">전자제품</a>
  <span class="sep">/</span>
  <a href="#">노트북</a>
  <span class="sep">/</span>
  <span class="current">맥북 프로 16</span>
</nav>`,
    css: `.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: #64748b; flex-wrap: wrap;
}
.breadcrumb a { color: #6366f1; text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb .sep { color: #cbd5e1; }
.breadcrumb .current { color: #0f172a; font-weight: 500; }`,
    js: '' },

  { id: 'button', num: 4, name: 'Button', nameKo: '버튼', cat: 'input',
    desc: '라벨이 붙은 클릭 가능한 영역. 액션을 명확하게 트리거하는 가장 기본적인 입력 컴포넌트.',
    usecase: '제출 · 저장 · 결제 · CTA',
    feature: '사용자 액션 트리거 / 시각적 위계(Primary/Secondary/Danger) 표현',
    html: `<button class="btn btn-primary">저장</button>
<button class="btn btn-secondary">취소</button>
<button class="btn btn-danger">삭제</button>
<button class="btn btn-primary" disabled>비활성</button>`,
    css: `.btn {
  padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent; font-family: inherit;
  transition: all .15s ease;
}
.btn-primary { background: #6366f1; color: #fff; }
.btn-primary:hover { background: #4f46e5; }
.btn-secondary { background: #fff; color: #0f172a; border-color: #e2e8f0; }
.btn-secondary:hover { background: #f8fafc; }
.btn-danger { background: #f43f5e; color: #fff; }
.btn-danger:hover { background: #e11d48; }
.btn:disabled { opacity: .5; cursor: not-allowed; }`,
    js: `document.querySelectorAll('.btn:not(:disabled)').forEach(btn => {
  btn.addEventListener('click', () => console.log('Clicked:', btn.textContent));
});` },

  { id: 'card', num: 5, name: 'Card', nameKo: '카드', cat: 'container',
    desc: '이미지·텍스트·버튼 등 이질적인 콘텐츠를 하나의 직사각형 단위로 묶어 진입점 역할을 하는 모듈.',
    usecase: '상품 목록 · 블로그 미리보기 · 대시보드 위젯',
    feature: '콘텐츠 묶음 + 클릭 진입점 / 그리드 레이아웃의 기본 단위',
    html: `<div class="product-card">
  <div class="pc-image"></div>
  <div class="pc-body">
    <h3 class="pc-title">맥북 프로 16</h3>
    <p class="pc-desc">M3 Pro · 36GB · 512GB</p>
    <div class="pc-price">₩3,490,000</div>
  </div>
</div>
<div class="product-card">
  <div class="pc-image" style="background:linear-gradient(135deg,#fde68a,#fca5a5);"></div>
  <div class="pc-body">
    <h3 class="pc-title">아이패드 프로</h3>
    <p class="pc-desc">M4 · 11형 · 256GB</p>
    <div class="pc-price">₩1,499,000</div>
  </div>
</div>`,
    css: `.product-card {
  width: 160px; background: #fff; border: 1px solid #e2e8f0;
  border-radius: 8px; overflow: hidden; cursor: pointer;
  transition: box-shadow .15s ease;
}
.product-card:hover { box-shadow: 0 4px 12px rgba(15,23,42,.08); }
.product-card .pc-image { height: 90px; background: linear-gradient(135deg,#c7d2fe,#a5f3fc); }
.product-card .pc-body { padding: 10px; }
.product-card .pc-title { font-size: 13px; font-weight: 600; margin: 0 0 4px; }
.product-card .pc-desc { font-size: 12px; color: #64748b; margin: 0 0 6px; }
.product-card .pc-price { font-size: 13px; font-weight: 700; color: #6366f1; }`,
    js: '' },

  { id: 'carousel', num: 6, name: 'Carousel', nameKo: '캐러셀', cat: 'container',
    desc: '같은 영역에서 슬라이드를 좌우로 넘기며 여러 콘텐츠를 순환 노출. 화면 면적 절약이 가장 큰 장점.',
    usecase: '랜딩 페이지 배너 · 상품 이미지 갤러리',
    feature: '콘텐츠 순환 노출 / 자동·수동 슬라이드 전환',
    html: `<div class="carousel" id="carousel-demo">
  <div class="carousel-track">
    <div class="carousel-slide s1">슬라이드 1</div>
    <div class="carousel-slide s2">슬라이드 2</div>
    <div class="carousel-slide s3">슬라이드 3</div>
  </div>
  <div class="carousel-controls">
    <button class="carousel-btn prev">‹</button>
    <div class="carousel-dots">
      <span class="carousel-dot active" data-i="0"></span>
      <span class="carousel-dot" data-i="1"></span>
      <span class="carousel-dot" data-i="2"></span>
    </div>
    <button class="carousel-btn next">›</button>
  </div>
</div>`,
    css: `.carousel { width: 100%; max-width: 320px; position: relative; }
.carousel-track { display: flex; overflow: hidden; border-radius: 8px; background: #f1f5f9; }
.carousel-slide {
  min-width: 100%; height: 100px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 700; color: #fff;
  transition: margin-left .3s ease;
}
.carousel-slide.s1 { background: linear-gradient(135deg,#6366f1,#a855f7); }
.carousel-slide.s2 { background: linear-gradient(135deg,#14b8a6,#06b6d4); }
.carousel-slide.s3 { background: linear-gradient(135deg,#f59e0b,#f43f5e); }
.carousel-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.carousel-btn {
  background: #fff; border: 1px solid #e2e8f0;
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; font-size: 14px;
}
.carousel-dots { display: flex; gap: 6px; }
.carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; cursor: pointer; }
.carousel-dot.active { background: #6366f1; }`,
    js: `(function() {
  const car = document.getElementById('carousel-demo');
  if (!car) return;
  const slides = car.querySelectorAll('.carousel-slide');
  const dots = car.querySelectorAll('.carousel-dot');
  let idx = 0;
  function go(i) {
    idx = (i + slides.length) % slides.length;
    slides[0].style.marginLeft = (-idx * 100) + '%';
    dots.forEach((d, j) => d.classList.toggle('active', j === idx));
  }
  car.querySelector('.prev').addEventListener('click', () => go(idx - 1));
  car.querySelector('.next').addEventListener('click', () => go(idx + 1));
  dots.forEach(d => d.addEventListener('click', () => go(+d.dataset.i)));
})();` },

  { id: 'checkbox', num: 7, name: 'Checkbox', nameKo: '체크박스', cat: 'input',
    desc: '독립적으로 켜고 끌 수 있는 사각형 체크 박스. 목록에서 0~N개 항목의 다중 선택을 표현한다.',
    usecase: '필터 · 약관 동의 · 할 일 목록',
    feature: '독립적 boolean 다중 선택 / 부분 선택(indeterminate) 상태 표현',
    html: `<div class="cb-group">
  <label class="cb-label"><input type="checkbox" checked> 이용약관 동의 (필수)</label>
  <label class="cb-label"><input type="checkbox" checked> 개인정보 수집 동의 (필수)</label>
  <label class="cb-label"><input type="checkbox"> 마케팅 정보 수신 (선택)</label>
  <label class="cb-label"><input type="checkbox" disabled> 비활성 항목</label>
</div>`,
    css: `.cb-group { display: flex; flex-direction: column; gap: 8px; }
.cb-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: #0f172a; cursor: pointer;
}
.cb-label input[type="checkbox"] { accent-color: #6366f1; width: 16px; height: 16px; }`,
    js: '' },

  { id: 'comment', num: 8, name: 'Comment', nameKo: '댓글', cat: 'info',
    desc: '사용자가 입력한 텍스트를 시간순으로 누적해서 보여주는 영역. 아바타·이름·시간 메타가 함께 표시된다.',
    usecase: '블로그·뉴스 댓글 · 코드 리뷰 코멘트',
    feature: '시간순 사용자 입력 표시 / 답글·좋아요 등 인터랙션 부착',
    html: `<div class="comment-list">
  <div class="comment">
    <div class="comment-avatar">홍</div>
    <div class="comment-body">
      <span class="comment-author">홍길동</span>
      <span class="comment-time">3분 전</span>
      <div class="comment-text">정말 유익한 글이네요 👍</div>
    </div>

    css: `.dropdown { position: relative; }
.dropdown-trigger {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 8px 14px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 10px; min-width: 140px;
}
.dropdown-trigger::after { content: '▾'; margin-left: auto; color: #94a3b8; font-size: 10px; }
.dropdown-menu {
  display: none; position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 6px;
  box-shadow: 0 8px 24px rgba(15,23,42,.08); overflow: hidden; z-index: 10;

.dropdown-item { padding: 8px 14px; font-size: 13px; cursor: pointer; }
.dropdown-item:hover { background: #f1f5f9; }`,
    js: `(function() {
  document.querySelectorAll('.dropdown').forEach(dd => {
    const trigger = dd.querySelector('.dropdown-trigger');
    const value = dd.querySelector('.dd-value');
    trigger.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('.dropdown.open').forEach(d => d !== dd && d.classList.remove('open'));
      dd.classList.toggle('open');
    });
    dd.querySelectorAll('.dropdown-item').forEach(item => {
      item.addEventListener('click', () => {
        if (value) value.textContent = item.textContent;
        dd.classList.remove('open');
      });
    });
  });

    document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));

})();` },

    html: `<div class="pagination" id="pg-demo">
  <button class="pg-btn" data-act="prev">‹</button>
  <button class="pg-btn active" data-i="1">1</button>
  <button class="pg-btn" data-i="2">2</button>

    css: `.pagination { display: flex; gap: 4px; align-items: center; }
.pg-btn {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 6px;
  min-width: 32px; height: 32px; padding: 0 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
}
.pg-btn:hover:not(:disabled) { background: #f1f5f9; }
.pg-btn:disabled { opacity: .4; cursor: not-allowed; }
.pg-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }`,
    js: `(function() {
  const pg = document.getElementById('pg-demo');
  if (!pg) return;
  const total = 5;
  let cur = 1;
  function set(n) {
    cur = Math.max(1, Math.min(total, n));
    pg.querySelectorAll('.pg-btn[data-i]').forEach(b => {
      b.classList.toggle('active', +b.dataset.i === cur);
    });
    pg.querySelector('[data-act="prev"]').disabled = cur === 1;
    pg.querySelector('[data-act="next"]').disabled = cur === total;
  }
  pg.addEventListener('click', e => {
    const b = e.target.closest('.pg-btn');
    if (!b) return;
    if (b.dataset.act === 'prev') set(cur - 1);
    else if (b.dataset.act === 'next') set(cur + 1);
    else if (b.dataset.i) set(+b.dataset.i);
  });
  set(1);
})();` },

  <div class="picker-calendar">

    css: `.picker-wrap { position: relative; }
.picker-input {
  border: 1px solid #e2e8f0; border-radius: 6px;

}

  box-shadow: 0 8px 24px rgba(15,23,42,.08); padding: 12px; z-index: 10;
}
.picker-wrap.open .picker-calendar { display: block; }
.picker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.picker-header button {
  background: transparent; border: none;
  font-size: 14px; cursor: pointer; color: #64748b; padding: 4px 8px;
}
.picker-header .month { font-size: 13px; font-weight: 700; }
.picker-grid { display: grid; grid-template-columns: repeat(7, 28px); gap: 2px; }
.picker-grid .pday-head {
  font-size: 10px; font-weight: 600;
  color: #94a3b8; text-align: center; padding: 4px 0;
}
.picker-grid .pday {
  width: 28px; height: 28px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer;
}
.picker-grid .pday:hover { background: #f1f5f9; }
.picker-grid .pday.selected { background: #6366f1; color: #fff; font-weight: 700; }
.picker-grid .pday.empty { visibility: hidden; }`,
    js: `(function() {
  const wrap = document.getElementById('picker-demo');
  if (!wrap) return;
  const input = wrap.querySelector('.picker-input');
  const grid = wrap.querySelector('.picker-grid');
  const monthEl = wrap.querySelector('.month');
  const today = new Date();
  let view = new Date(today.getFullYear(), today.getMonth(), 1);
  let selected = null;
  function render() {
    monthEl.textContent = view.getFullYear() + '년 ' + (view.getMonth() + 1) + '월';
    grid.innerHTML = '';
    ['일','월','화','수','목','금','토'].forEach(d => {
      const h = document.createElement('div');
      h.className = 'pday-head'; h.textContent = d;
      grid.appendChild(h);
    });
    const firstDay = view.getDay();
    const daysInMonth = new Date(view.getFullYear(), view.getMonth() + 1, 0).getDate();
    for (let i = 0; i < firstDay; i++) {
      const e = document.createElement('div');
      e.className = 'pday empty'; grid.appendChild(e);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const day = document.createElement('div');
      day.className = 'pday'; day.textContent = d;
      if (selected && selected.getFullYear() === view.getFullYear() &&
          selected.getMonth() === view.getMonth() && selected.getDate() === d) {
        day.classList.add('selected');
      }
      day.addEventListener('click', () => {
        selected = new Date(view.getFullYear(), view.getMonth(), d);
        input.value = selected.toISOString().slice(0, 10);
        wrap.classList.remove('open');
        render();
      });
      grid.appendChild(day);
    }
  }
  input.addEventListener('click', e => {
    e.stopPropagation();
    wrap.classList.toggle('open');
  });
  wrap.querySelector('[data-act="prev"]').addEventListener('click', e => {
    e.stopPropagation();
    view.setMonth(view.getMonth() - 1); render();
  });
  wrap.querySelector('[data-act="next"]').addEventListener('click', e => {
    e.stopPropagation();
    view.setMonth(view.getMonth() + 1); render();
  });
  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) wrap.classList.remove('open');
  });
  render();
})();` },

    css: `.stepper {
  display: flex; align-items: center;
  border: 1px solid #e2e8f0; border-radius: 6px;
  overflow: hidden; width: fit-content; background: #fff;
}
.stepper button {
  background: #fff; border: none;
  width: 32px; height: 32px;
  font-size: 16px; font-weight: 700; cursor: pointer;
}
.stepper button:hover:not(:disabled) { background: #f1f5f9; }
.stepper button:disabled { color: #cbd5e1; cursor: not-allowed; }
.stepper .stepper-value {
  min-width: 40px; text-align: center;
  font-size: 13px; font-weight: 600;
  border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0;
  padding: 6px 8px;
}`,
    js: `(function() {
  const st = document.getElementById('stepper-demo');
  if (!st) return;
  const val = st.querySelector('.stepper-value');
  const minus = st.querySelector('[data-act="-"]');
  const plus = st.querySelector('[data-act="+"]');
  const MIN = 1, MAX = 99;
  function update() {
    const n = +val.textContent;
    minus.disabled = n <= MIN;
    plus.disabled = n >= MAX;
  }
  minus.addEventListener('click', () => {
    const n = +val.textContent;
    if (n > MIN) { val.textContent = n - 1; update(); }
  });
  plus.addEventListener('click', () => {
    const n = +val.textContent;
    if (n < MAX) { val.textContent = n + 1; update(); }
  });
  update();
})();` },

                css: `/* Hide scrollbar if overflow allows scrolling manually */
.no-scrollbar::-webkit-scrollbar {

}

                script: () => {
                    const track = document.getElementById('carousel-track');
                    const prevBtn = document.getElementById('prev-btn');
                    const nextBtn = document.getElementById('next-btn');
                    const indicators = document.querySelectorAll('.indicator');
                    let currentIndex = 0;
                    const totalSlides = 3;

                    function update() {
                        track.style.transform = `translateX(-${currentIndex * 100}%)`;
                        // Update buttons
                        prevBtn.disabled = currentIndex === 0;
                        nextBtn.disabled = currentIndex === totalSlides - 1;
                        // Update indicators
                        indicators.forEach((ind, i) => {
                            ind.classList.toggle('bg-slate-800', i === currentIndex);
                            ind.classList.toggle('bg-slate-300', i !== currentIndex);
                        });
                    }

                    nextBtn.addEventListener('click', () => {
                        if (currentIndex < totalSlides - 1) {
                            currentIndex++;
                            update();
                        }
                    });

                    prevBtn.addEventListener('click', () => {
                        if (currentIndex > 0) {
                            currentIndex--;
                            update();
                        }
                    });
                    
                    update(); // Init
                }
            },

                html: `<div class="relative w-full max-w-[200px]">
  <button id="dropdown-btn" class="inline-flex w-full justify-between items-center rounded-md bg-white px-4 py-2.5 text-sm font-medium text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50">

                css: `/* Tailwind Transitions for Dropdown */
/* transition-all duration-200 */
/* opacity-0 translate-y-2 (Hidden State) */`,
                script: () => {
                    const btn = document.getElementById('dropdown-btn');
                    const menu = document.getElementById('dropdown-menu');
                    const icon = document.getElementById('dropdown-icon');
                    
                    const toggle = () => {
                        const isHidden = menu.classList.contains('hidden');
                        if (isHidden) {
                            menu.classList.remove('hidden');
                            // Small delay for transition to work
                            setTimeout(() => {
                                menu.classList.remove('opacity-0', 'translate-y-2');
                            }, 10);
                            icon.style.transform = 'rotate(180deg)';
                        } else {
                            menu.classList.add('opacity-0', 'translate-y-2');
                            setTimeout(() => {
                                menu.classList.add('hidden');
                            }, 200);
                            icon.style.transform = 'rotate(0deg)';
                        }
                    };

                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggle();
                    });

                    // Close on outside click
                    document.addEventListener('click', (e) => {
                        if (!btn.contains(e.target) && !menu.contains(e.target)) {
                            menu.classList.add('opacity-0', 'translate-y-2');
                            setTimeout(() => menu.classList.add('hidden'), 200);
                            icon.style.transform = 'rotate(0deg)';
                        }
                    });
                }
            },

                css: `/* Mobile Menu Transitions */
/* Panel Slide: translate-x-full -> translate-x-0 */
/* Overlay Fade: opacity-0 -> opacity-100 */`,
                script: () => {
                    const trigger = document.getElementById('menu-trigger');
                    const close = document.getElementById('menu-close');
                    const overlay = document.getElementById('mobile-menu');
                    const panel = document.getElementById('menu-panel');

                    trigger.addEventListener('click', () => {
                        overlay.classList.remove('hidden');

      </p>
      <div class="flex justify-end gap-2">

                css: `/* Modal Animations */
/* Overlay: opacity-0 -> opacity-100 */
/* Content: scale-95 -> scale-100 */`,
                script: () => {
                    const openBtn = document.getElementById('modal-open');
                    const overlay = document.getElementById('modal-overlay');
                    const content = document.getElementById('modal-content');
                    const closeBtns = [
                        document.getElementById('modal-close'), 
                        document.getElementById('modal-cancel')
                    ];

                    openBtn.addEventListener('click', () => {
                        overlay.classList.remove('hidden');
                        requestAnimationFrame(() => {
                            overlay.classList.remove('opacity-0');
                            content.classList.remove('scale-95');
                            content.classList.add('scale-100');
                        });
                    });

                    const closeModal = () => {
                        overlay.classList.add('opacity-0');
                        content.classList.remove('scale-100');
                        content.classList.add('scale-95');
                        setTimeout(() => {
                            overlay.classList.add('hidden');
                        }, 300);
                    };

                    closeBtns.forEach(btn => btn.addEventListener('click', closeModal));
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) closeModal();
                    });
                }
            },

                script: () => {

                    const text = document.getElementById('progress-text');

                    btn.addEventListener('click', () => {
                        let width = 0;
                        btn.disabled = true;
                        btn.innerText = "Downloading...";
                        
                        const interval = setInterval(() => {
                            if (width >= 100) {
                                clearInterval(interval);
                                btn.disabled = false;
                                btn.innerText = "Done (Click to Reset)";
                                width = 100;
                            } else {
                                width += Math.random() * 10;
                                if(width > 100) width = 100;

                            bar.style.width = width + '%';

                                         text.innerText = '0%';
                                         btn.innerText = "Simulate Download";

                        }, 200);

            <input class="shake-input" type="email" placeholder="email@example.com" id="shakeEmail">
            <span class="shake-error-text" id="emailError">올바른 이메일을 입력해주세요.</span>
          </div>
          <div class="shake-input-group">
            <label>비밀번호</label>
            <input class="shake-input" type="password" placeholder="••••••••" id="shakePassword">
            <span class="shake-error-text" id="passError">비밀번호가 일치하지 않습니다.</span>
          </div>
          <button class="shake-btn" onclick="demos.shake.fire()">로그인</button>
        </div>
      `;
    },
    fire() {
      const email = document.getElementById('shakeEmail');
      const pass = document.getElementById('shakePassword');
      [email, pass].forEach(el => {
        el.classList.remove('error');
        void el.offsetWidth;
        el.classList.add('error');
      });
      document.getElementById('emailError').classList.add('show');
      document.getElementById('passError').classList.add('show');
      setTimeout(() => {
        [email, pass].forEach(el => el.classList.remove('error'));
      }, 600);
    },

  confetti: {
    title: 'Destructive Confetti',
    desc: '삭제 같은 위험한 액션 실행 시 빨간 파티클이 터지는 효과. 시각적 임팩트로 "이건 되돌릴 수 없다"는 느낌을 줍니다.',
    url: 'myapp.io/danger-zone',
    render(body) {
      body.innerHTML = `
        <div class="confetti-demo">
          <p style="color:var(--text-dim);margin-bottom:20px;font-size:14px;">버튼을 클릭하면 파티클 효과가 발생합니다</p>
          <button class="confetti-btn" onclick="demos.confetti.fire(event)">💥 프로젝트 삭제</button>
        </div>
      `;
    },
    fire(e) {
      const btn = e.currentTarget;
      const rect = btn.getBoundingClientRect();
      const demoBody = document.querySelector('.demo-body');
      const bodyRect = demoBody.getBoundingClientRect();
      const cx = rect.left + rect.width / 2 - bodyRect.left;
      const cy = rect.top + rect.height / 2 - bodyRect.top;
      const colors = ['#ff4757', '#ff6b81', '#ff9f43', '#ee5a24', '#c44569'];
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (Math.PI * 2 * i) / 30;
        const velocity = 60 + Math.random() * 100;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;
        p.style.cssText = `
          position:absolute;
          left:${cx}px;top:${cy}px;
          width:${4 + Math.random() * 6}px;
          height:${4 + Math.random() * 6}px;
          background:${colors[Math.floor(Math.random() * colors.length)]};
          border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
          --tx:${tx}px;--ty:${ty}px;
          animation:particleFly ${0.5 + Math.random() * 0.5}s ease-out forwards;
          pointer-events:none;
        `;
        demoBody.appendChild(p);
        setTimeout(() => p.remove(), 1200);
      }
      btn.style.transform = 'scale(0.95)';
      setTimeout(() => btn.style.transform = '', 150);
    },
    code: `function destructiveConfetti(el) {\n  for (let i = 0; i < 30; i++) {\n    const angle = (Math.PI * 2 * i) / 30;\n    createParticle(el, angle);\n  }\n}`
  }
};</script>
<script type="text/css" id="alert-css">:root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-hover: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #7a7a90;
    --accent: #ff6b3d;
    --accent-glow: rgba(255, 107, 61, 0.15);
    --danger: #ff4757;
    --success: #2ed573;
    --warning: #ffa502;
    --info: #3742fa;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Layout ─── */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 32px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 24px;
    margin-bottom: 8px;
  }

  .sidebar h1 {
    font-size: 22px;
    font-weight: 700;
    padding: 0 24px;
    margin-bottom: 32px;
    background: linear-gradient(135deg, var(--accent), #ff9f43);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .menu-group {
    margin-bottom: 24px;
  }

  .menu-group-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 24px;
    margin-bottom: 8px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .menu-item:hover {
    background: var(--surface-hover);
    color: var(--text);
  }

  .menu-item.active {
    background: var(--accent-glow);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 500;
  }

  .menu-item .icon {
    width: 20px;
    text-align: center;
    font-size: 16px;
  }

  .menu-item .badge {
    margin-left: auto;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 6px;
    background: var(--border);
    border-radius: 4px;
    color: var(--text-dim);
  }

  /* ─── Main Content ─── */
  .main {
    padding: 48px;
    position: relative;
  }

  .demo-header {
    margin-bottom: 40px;
  }

  .demo-header h2 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .demo-header p {
    color: var(--text-dim);
    font-size: 15px;
    max-width: 600px;
    line-height: 1.6;
  }

  .demo-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-height: 500px;
    position: relative;
    overflow: hidden;
  }

  .demo-toolbar {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .demo-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--border);
  }
  .demo-dot:nth-child(1) { background: #ff5f57; }
  .demo-dot:nth-child(2) { background: #febc2e; }
  .demo-dot:nth-child(3) { background: #28c840; }

  .demo-url {
    flex: 1;
    text-align: center;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    background: var(--bg);
    padding: 6px 16px;
    border-radius: 6px;
    margin-left: 8px;
  }

  .demo-body {
    padding: 32px;
    min-height: 440px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .trigger-btn {
    padding: 14px 32px;
    background: linear-gradient(135deg, var(--accent), #e55a2b);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(255, 107, 61, 0.3);
  }

  .trigger-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(255, 107, 61, 0.4);
  }

  .trigger-btn:active {
    transform: translateY(0);
  }

  /* ─── Code Block ─── */
  .code-section {
    margin-top: 24px;
  }

  .code-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .code-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .code-block {
    display: none;
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .code-block.show { display: block; }

  .code-block pre {
    padding: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-dim);
    overflow-x: auto;
  }

  .code-block .kw { color: var(--accent); }
  .code-block .str { color: var(--success); }
  .code-block .cm { color: #555; }

  /* ═══════════════════════════════════════════ */
  /* ─── 1. Toast ─── */
  /* ═══════════════════════════════════════════ */
  .toast-container {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
  }

  .toast {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: #1e1e2e;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    min-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    border-left: 3px solid var(--success);
  }

  .toast.error { border-left-color: var(--danger); }
  .toast.warning { border-left-color: var(--warning); }

  .toast-icon { font-size: 18px; }
  .toast-close {
    margin-left: auto;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s;
    font-size: 18px;
  }
  .toast-close:hover { opacity: 1; }

  .toast-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--success);
    border-radius: 0 0 0 10px;
    animation: toastProgress 3s linear forwards;
  }

  .toast.error .toast-progress { background: var(--danger); }
  .toast.warning .toast-progress { background: var(--warning); }

  @keyframes toastIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes toastProgress {
    from { width: 100%; }
    to { width: 0%; }
  }

  /* ═══════════════════════════════════════════ */
  /* ─── 2. Top Banner ─── */
  /* ═══════════════════════════════════════════ */
  .banner {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    font-weight: 500;
    animation: bannerSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 100;
  }

  .banner.danger {
    background: linear-gradient(90deg, #ff4757, #ff6b81);
    color: white;
  }

  .banner.warning {
    background: linear-gradient(90deg, #ffa502, #ffbe42);
    color: #1a1a2e;
  }

  .banner.info {
    background: linear-gradient(90deg, #3742fa, #5f6cff);
    color: white;
  }

  .banner-close {
    margin-left: auto;
    cursor: pointer;
    opacity: 0.7;
    font-size: 20px;
    transition: opacity 0.2s;
  }
  .banner-close:hover { opacity: 1; }

  @keyframes bannerSlide {
    from { transform: translateY(-100%); }
    to { transform: translateY(0); }
  }

  /* ═══════════════════════════════════════════ */
  /* ─── 3. Inline Alert ─── */
  /* ═══════════════════════════════════════════ */
  .inline-alert {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
    animation: inlineFade 0.4s ease;
    max-width: 500px;
    width: 100%;
  }

  .inline-alert.danger {
    background: rgba(255, 71, 87, 0.1);
    border: 1px solid rgba(255, 71, 87, 0.3);
    color: #ff6b7a;
  }

  .inline-alert.success {
    background: rgba(46, 213, 115, 0.1);
    border: 1px solid rgba(46, 213, 115, 0.3);
    color: #5ae88c;
  }

  .inline-alert.warning {
    background: rgba(255, 165, 2, 0.1);
    border: 1px solid rgba(255, 165, 2, 0.3);
    color: #ffbe42;
  }

  .inline-alert-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .inline-alert-title { font-weight: 600; margin-bottom: 4px; }

  @keyframes inlineFade {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ═══════════════════════════════════════════ */
  /* ─── 4. Slide-over Panel ─── */
  /* ═══════════════════════════════════════════ */
  .slideover-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
    animation: fadeIn 0.3s ease;
  }

  .slideover {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 380px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 100;
    animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
  }

  .slideover-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .slideover-header h3 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .slideover-close {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
  }
  .slideover-close:hover { background: var(--surface-hover); color: var(--text); }

  .slideover-body {
    padding: 24px;
    flex: 1;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.7;
  }

  .slideover-footer {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .slideover-footer button {
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-cancel {
    background: var(--surface-hover);
    color: var(--text);
    border: 1px solid var(--border) !important;
  }

  .btn-danger {
    background: var(--danger);
    color: white;
    box-shadow: 0 4px 16px rgba(255, 71, 87, 0.3);
  }

  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ═══════════════════════════════════════════ */
  /* ─── 5. Shake Effect ─── */
  /* ═══════════════════════════════════════════ */
  .shake-demo {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 320px;
  }

  .shake-input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .shake-input-group label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
  }

  .shake-input {
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: all 0.2s;
  }

  .shake-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .shake-input.error {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.15);
    animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
  }

  .shake-error-text {
    font-size: 12px;
    color: var(--danger);
    display: none;
  }

  .shake-error-text.show { display: block; }

  .shake-btn {
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }

  /* ═══════════════════════════════════════════ */
  /* ─── 6. Full-screen Takeover ─── */
  /* ═══════════════════════════════════════════ */
  .fullscreen-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 15, 0.92);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.4s ease;
  }

  .fullscreen-card {
    text-align: center;
    padding: 48px;
    animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .fullscreen-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255, 71, 87, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin: 0 auto 24px;
    border: 2px solid rgba(255, 71, 87, 0.3);
  }

  .fullscreen-card h3 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .fullscreen-card p {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 400px;
  }

  .fullscreen-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .fullscreen-actions button {
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  @keyframes scaleIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* ═══════════════════════════════════════════ */
  /* ─── 7. Popover ─── */
  /* ═══════════════════════════════════════════ */
  .popover-demo {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .popover-trigger {
    padding: 12px 20px;
    background: var(--surface-hover);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
  }

  .popover-trigger:hover { border-color: var(--accent); }

  .popover {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e1e2e;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    min-width: 240px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    animation: popoverIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: none;
    z-index: 50;
  }

  .popover::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: #1e1e2e;
  }

  .popover.show { display: block; }

  .popover-title {
    font-weight: 600;
    color: var(--warning);
    margin-bottom: 6px;
    font-size: 13px;
  }

  @keyframes popoverIn {
    from { opacity: 0; transform: translateX(-50%) translateY(4px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ═══════════════════════════════════════════ */
  /* ─── 8. Command Bar ─── */
  /* ═══════════════════════════════════════════ */
  .command-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 15, 0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 80px;
    z-index: 100;
    animation: fadeIn 0.2s ease;
  }

  .command-bar {
    width: 520px;
    background: #1a1a28;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
    animation: commandIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .command-bar-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .command-bar-icon {
    color: var(--warning);
    font-size: 20px;
  }

  .command-bar-content {
    flex: 1;
  }

  .command-bar-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .command-bar-desc {
    font-size: 13px;
    color: var(--text-dim);
  }

  .command-bar-actions {
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    background: rgba(0,0,0,0.2);
  }

  .command-bar-actions button {
    padding: 8px 18px;
    border-radius: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .command-bar-actions .kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 6px;
    background: var(--border);
    border-radius: 4px;
    margin-left: 8px;
    color: var(--text-dim);
  }

  @keyframes commandIn {
    from { transform: scale(0.96) translateY(-10px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* ═══════════════════════════════════════════ */
  /* ─── 9. Notification Drawer ─── */
  /* ═══════════════════════════════════════════ */
  .notif-list {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .notif-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: #1a1a28;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    animation: notifSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  }

  .notif-item:nth-child(2) { animation-delay: 0.08s; }
  .notif-item:nth-child(3) { animation-delay: 0.16s; }
  .notif-item:nth-child(4) { animation-delay: 0.24s; }

  .notif-item:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
    transform: translateX(4px);
  }

  .notif-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .notif-dot.red { background: var(--danger); box-shadow: 0 0 8px rgba(255,71,87,0.5); }
  .notif-dot.yellow { background: var(--warning); box-shadow: 0 0 8px rgba(255,165,2,0.5); }
  .notif-dot.green { background: var(--success); box-shadow: 0 0 8px rgba(46,213,115,0.5); }
  .notif-dot.blue { background: var(--info); box-shadow: 0 0 8px rgba(55,66,250,0.5); }

  .notif-content { flex: 1; }
  .notif-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .notif-desc { font-size: 12px; color: var(--text-dim); }
  .notif-time { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  @keyframes notifSlide {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ═══════════════════════════════════════════ */
  /* ─── 10. Destructive Confetti ─── */
  /* ═══════════════════════════════════════════ */
  .confetti-demo {
    text-align: center;
  }

  .confetti-btn {
    padding: 14px 32px;
    background: transparent;
    border: 2px solid var(--danger);
    color: var(--danger);
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }

  .confetti-btn:hover {
    background: var(--danger);
    color: white;
    box-shadow: 0 4px 20px rgba(255, 71, 87, 0.3);
  }

  .particle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
  }

  @keyframes particleFly {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* ─── Placeholder content ─── */
  .placeholder-lines {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 24px;
    opacity: 0.3;
  }

  .placeholder-line {
    height: 12px;
    background: var(--border);
    border-radius: 6px;
  }

  .placeholder-line:nth-child(1) { width: 80%; }
  .placeholder-line:nth-child(2) { width: 100%; }
  .placeholder-line:nth-child(3) { width: 65%; }
  .placeholder-line:nth-child(4) { width: 90%; }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: auto;
      z-index: 1000;
      display: flex;
      overflow-x: auto;
      padding: 12px;
      gap: 4px;
    }
    .sidebar-title, .sidebar h1, .menu-group-label { display: none; }
    .menu-group { display: flex; gap: 4px; margin: 0; }
    .menu-item {
      padding: 8px 14px;
      white-space: nowrap;
      font-size: 13px;
      border-left: none;
      border-radius: 8px;
    }
    .menu-item.active {
      border-left: none;
      border-radius: 8px;
    }
    .main { padding: 24px 16px 100px; }
  }</script>
<script id="uk-app">
(function(){
  'use strict';
  var ALERT_CSS = document.getElementById('alert-css').textContent;
  var FONTS = '<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">';
  var TW = 'https://cdn.tailwindcss.com';
  var LU = 'https://unpkg.com/lucide@latest';

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fnBody(fn){ var s = fn.toString(); return s.slice(s.indexOf('{')+1, s.lastIndexOf('}')).replace(/^\n+/,'').replace(/\s+$/,''); }

  // ---- standalone document builders (preview === download === copy-all) ----
  function docPage(o){
    o = o || {};
    return [
      '<!doctype html>','<html lang="ko">','<head>','<meta charset="utf-8">',
      '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
      FONTS, (o.head||''),
      (o.css ? '<style>\n'+o.css+'\n</style>' : ''),
      '<style>html,body{margin:0}body{padding:28px;font-family:Inter,"Noto Sans KR",system-ui,sans-serif;background:#ffffff;color:#0f172a}</style>',
      '</head>','<body>', (o.body||''),
      (o.js ? '<script>\n'+o.js+'\n<\/script>' : ''),
      '</body>','</html>'
    ].join('\n');
  }

  function alertPage(k){
    var d = ALERT_DEMOS[k];
    var fns = [];
    for (var key in d){ if (typeof d[key] === 'function') fns.push(d[key].toString()); }
    var demosSrc = "const demos = { '"+k+"': {\n      "+fns.join(',\n      ')+"\n    } };";
    return [
      '<!doctype html>','<html lang="ko">','<head>','<meta charset="utf-8">',
      '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
      FONTS, '<style>\n'+ALERT_CSS+'\n</style>',
      '<style>html,body{margin:0}.main{padding:0}.demo-area{margin:0}</style>',
      '</head>','<body>',
      '<main class="main"><div class="demo-area">',
      '<div class="demo-toolbar"><div class="demo-dot"></div><div class="demo-dot"></div><div class="demo-dot"></div><div class="demo-url">'+(d.url||'preview')+'</div></div>',
      '<div class="demo-body" id="demoBody"></div>',
      '</div></main>',
      '<script>\n'+demosSrc+'\ndemos[\''+k+'\'].render(document.getElementById(\'demoBody\'));\n<\/script>',
      '</body>','</html>'
    ].join('\n');
  }

  // ---- normalize all three sources into one item list ----
  var items = [];
  var CAT_LABEL = { input:'입력 (Input)', nav:'내비게이션 (Navigation)', info:'정보 (Information)', container:'컨테이너 (Container)' };

  // 1) Vanilla catalog (no deps)
  CATALOG.forEach(function(c){
    items.push({
      group:'vanilla', sub: CAT_LABEL[c.cat] || c.cat,
      key:'v-'+c.id, catKey:c.cat, name:c.name, nameKo:c.nameKo||'', desc:c.desc||'',
      htmlSrc:c.html||'', cssSrc:c.css||'', jsSrc:c.js||'',
      deps:'',
      build:function(){ return docPage({ css:this.cssSrc, body:this.htmlSrc, js:this.jsSrc }); }
    });
  });

  // 2) Tailwind / Lucide set
  UIXBASE.forEach(function(c){
    var jsBody = c.script ? fnBody(c.script) : '';
    items.push({
      group:'tailwind', sub:'Tailwind + Lucide',
      key:'t-'+c.id, name:c.name, nameKo:'', desc:c.desc||'',
      htmlSrc:c.html||'',
      cssSrc:(c.css && c.css.trim()) ? c.css.trim() : '/* Tailwind 유틸리티 클래스만 사용 — 별도 CSS 불필요 */',
      jsSrc:(jsBody ? jsBody+'\n\n' : '') + 'lucide.createIcons(); // 아이콘 렌더',
      deps:'Tailwind CSS + Lucide (CDN 자동 포함)',
      build:function(){
        return docPage({
          head:'<script src="'+TW+'"><\/script>\n<script src="'+LU+'"><\/script>',
          body:this.htmlSrc,
          js:(jsBody ? jsBody+'\n' : '') + 'lucide.createIcons();'
        });
      }
    });
  });

  // 3) Feedback / alert patterns (engine-driven, no deps)
  Object.keys(ALERT_DEMOS).forEach(function(k){
    var d = ALERT_DEMOS[k];
    var tmp = document.createElement('div');
    try { d.render(tmp); } catch(e){}
    var markup = tmp.innerHTML.trim();
    var fnsrc = [];
    for (var key in d){ if (typeof d[key] === 'function') fnsrc.push('// ['+k+'] '+key+'\n'+d[key].toString()); }
    items.push({
      group:'alert', sub:'Feedback & Notification',
      key:'a-'+k, name:d.title, nameKo:'', desc:d.desc||'',
      htmlSrc:'<!-- 트리거 + 컨테이너 마크업. 아래 JS(엔진)와 함께 동작합니다 -->\n'+markup,
      cssSrc:ALERT_CSS,
      jsSrc:fnsrc.join('\n\n'),
      deps:'순수 CSS/JS (의존성 없음) — 아래 CSS와 JS 엔진을 함께 사용',
      build:function(){ return alertPage(k); }
    });
  });

  // ---- sidebar ----
  var GROUPS = [
    { id:'vanilla',  label:'기본 컴포넌트 · Vanilla (CSS/JS)', tag:'32' },
    { id:'tailwind', label:'기본 컴포넌트 · Tailwind + Lucide', tag:'32' },
    { id:'alert',    label:'피드백 · 알림 패턴 (다이얼로그 외)', tag:'10' }
  ];
  var menu = document.getElementById('uk-menu');
  var current = null;

  function buildMenu(query){
    query = (query||'').trim().toLowerCase();
    menu.innerHTML = '';
    GROUPS.forEach(function(g){
      var list = items.filter(function(it){
        if (it.group !== g.id) return false;
        if (!query) return true;
        return (it.name+' '+it.nameKo+' '+it.sub).toLowerCase().indexOf(query) >= 0;
      });
      if (!list.length) return;
      if (g.id === 'vanilla'){
        var order = { input:0, nav:1, info:2, container:3 };
        list = list.slice().sort(function(a,b){ return (order[a.catKey]!=null?order[a.catKey]:9) - (order[b.catKey]!=null?order[b.catKey]:9); });
      }
      var gh = document.createElement('div');
      gh.className = 'uk-group';
      gh.innerHTML = '<span>'+esc(g.label)+'</span><span class="uk-group-tag">'+list.length+'</span>';
      menu.appendChild(gh);
      var lastSub = null;
      list.forEach(function(it){
        if (g.id === 'vanilla' && it.sub !== lastSub){
          lastSub = it.sub;
          var sh = document.createElement('div');
          sh.className = 'uk-sub';
          sh.textContent = it.sub;
          menu.appendChild(sh);
        }
        var b = document.createElement('button');
        b.className = 'uk-item' + (current && current.key === it.key ? ' active' : '');
        b.dataset.key = it.key;
        b.innerHTML = '<span class="uk-item-name">'+esc(it.name)+'</span>'+(it.nameKo?'<span class="uk-item-ko">'+esc(it.nameKo)+'</span>':'');
        b.addEventListener('click', function(){ openItem(it.key); });
        menu.appendChild(b);
      });
    });
  }

  // ---- main view ----
  var view = document.getElementById('uk-view');
  var activeTab = 'preview';

  function openItem(key){
    var it = items.filter(function(x){ return x.key === key; })[0];
    if (!it) return;
    current = it;
    activeTab = 'preview';
    Array.prototype.forEach.call(menu.querySelectorAll('.uk-item'), function(b){
      b.classList.toggle('active', b.dataset.key === key);
    });
    var groupLabel = (GROUPS.filter(function(g){return g.id===it.group;})[0]||{}).label || '';
    view.innerHTML =
      '<div class="uk-head">'
      + '<div class="uk-crumb">'+esc(groupLabel)+' / '+esc(it.sub)+'</div>'
      + '<div class="uk-title-row"><h1>'+esc(it.name)+'</h1>'+(it.nameKo?'<span class="uk-title-ko">'+esc(it.nameKo)+'</span>':'')+'</div>'
      + '<p class="uk-desc">'+esc(it.desc)+'</p>'
      + (it.deps?'<div class="uk-deps">⛓ '+esc(it.deps)+'</div>':'')
      + '<div class="uk-actions">'
      +   '<button class="uk-btn primary" id="uk-dl">⬇ 전체 .html 다운로드</button>'
      +   '<button class="uk-btn" id="uk-copyall">📋 전체 코드 복사 (그대로 동작)</button>'
      + '</div>'
      + '</div>'
      + '<div class="uk-tabs">'
      +   '<button class="uk-tab active" data-tab="preview">Preview</button>'
      +   '<button class="uk-tab" data-tab="html">HTML</button>'
      +   '<button class="uk-tab" data-tab="css">CSS</button>'
      +   '<button class="uk-tab" data-tab="js">JS</button>'
      + '</div>'
      + '<div class="uk-panels">'
      +   '<div class="uk-panel active" data-panel="preview"><div class="uk-preview" id="uk-preview"></div></div>'
      +   '<div class="uk-panel" data-panel="html"><div class="uk-code"><button class="uk-copy" data-c="html">복사</button><pre><code>'+esc(it.htmlSrc)+'</code></pre></div></div>'
      +   '<div class="uk-panel" data-panel="css"><div class="uk-code"><button class="uk-copy" data-c="css">복사</button><pre><code>'+esc(it.cssSrc)+'</code></pre></div></div>'
      +   '<div class="uk-panel" data-panel="js"><div class="uk-code"><button class="uk-copy" data-c="js">복사</button><pre><code>'+esc(it.jsSrc||'/* JS 없음 */')+'</code></pre></div></div>'
      + '</div>';

    document.getElementById('uk-preview').appendChild(makeFrame(it));

    Array.prototype.forEach.call(view.querySelectorAll('.uk-tab'), function(t){
      t.addEventListener('click', function(){
        activeTab = t.dataset.tab;
        Array.prototype.forEach.call(view.querySelectorAll('.uk-tab'), function(x){ x.classList.remove('active'); });
        Array.prototype.forEach.call(view.querySelectorAll('.uk-panel'), function(p){ p.classList.remove('active'); });
        t.classList.add('active');
        view.querySelector('[data-panel="'+activeTab+'"]').classList.add('active');
      });
    });
    Array.prototype.forEach.call(view.querySelectorAll('.uk-copy'), function(btn){
      btn.addEventListener('click', function(){
        var map = { html:it.htmlSrc, css:it.cssSrc, js:it.jsSrc };
        copy(map[btn.dataset.c]||'', btn);
      });
    });
    document.getElementById('uk-dl').addEventListener('click', function(){ download(it); });
    document.getElementById('uk-copyall').addEventListener('click', function(e){ copy(it.build(), e.currentTarget); });
  }

  function makeFrame(it){
    var ifr = document.createElement('iframe');
    ifr.className = 'uk-frame';
    ifr.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-modals allow-popups allow-forms');
    ifr.srcdoc = it.build();
    function fit(){ try { var h = ifr.contentDocument.body.scrollHeight; if (h > 40) ifr.style.height = Math.min(Math.max(h + 36, 380), 980) + 'px'; } catch(e){} }
    ifr.addEventListener('load', function(){ fit(); setTimeout(fit, 400); setTimeout(fit, 1000); });
    return ifr;
  }

  function copy(text, btn){
    var done = function(){ if(!btn) return; var o = btn.textContent; btn.textContent = '복사됨!'; btn.classList.add('ok'); setTimeout(function(){ btn.textContent = o; btn.classList.remove('ok'); }, 1400); };
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done, function(){ fallback(text); done(); });
    } else { fallback(text); done(); }
  }
  function fallback(text){ var ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); }catch(e){} document.body.removeChild(ta); }

  function download(it){
    var blob = new Blob([it.build()], { type:'text/html;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = it.key + '.html';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

  // ---- search ----
  var search = document.getElementById('uk-search');
  search.addEventListener('input', function(){ buildMenu(search.value); });

  // ---- boot ----
  buildMenu('');
  openItem(items[0].key);
})();

</script>
</body>
</html>
