                script: () => {
                    const track = document.getElementById('carousel-track');
                    const prevBtn = document.getElementById('prev-btn');
                    const nextBtn = document.getElementById('next-btn');
                    const indicators = document.querySelectorAll('.indicator');
                    let currentIndex = 0;
                    const totalSlides = 3;

                    function update() {
                        track.style.transform = `translateX(-${currentIndex * 100}%)`;
                        // Update buttons
                        prevBtn.disabled = currentIndex === 0;
                        nextBtn.disabled = currentIndex === totalSlides - 1;
                        // Update indicators
                        indicators.forEach((ind, i) => {
                            ind.classList.toggle('bg-slate-800', i === currentIndex);
                            ind.classList.toggle('bg-slate-300', i !== currentIndex);
                        });
                    }

                    nextBtn.addEventListener('click', () => {
                        if (currentIndex < totalSlides - 1) {
                            currentIndex++;
                            update();
                        }
                    });

                    prevBtn.addEventListener('click', () => {
                        if (currentIndex > 0) {
                            currentIndex--;
                            update();
                        }
                    });
                    
                    update(); // Init
                }
            },

                css: `/* Tailwind Transitions for Dropdown */
/* transition-all duration-200 */
/* opacity-0 translate-y-2 (Hidden State) */`,
                script: () => {
                    const btn = document.getElementById('dropdown-btn');
                    const menu = document.getElementById('dropdown-menu');
                    const icon = document.getElementById('dropdown-icon');
                    
                    const toggle = () => {
                        const isHidden = menu.classList.contains('hidden');
                        if (isHidden) {
                            menu.classList.remove('hidden');
                            // Small delay for transition to work
                            setTimeout(() => {
                                menu.classList.remove('opacity-0', 'translate-y-2');
                            }, 10);
                            icon.style.transform = 'rotate(180deg)';
                        } else {
                            menu.classList.add('opacity-0', 'translate-y-2');
                            setTimeout(() => {
                                menu.classList.add('hidden');
                            }, 200);
                            icon.style.transform = 'rotate(0deg)';
                        }
                    };

                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggle();
                    });

                    // Close on outside click
                    document.addEventListener('click', (e) => {
                        if (!btn.contains(e.target) && !menu.contains(e.target)) {
                            menu.classList.add('opacity-0', 'translate-y-2');
                            setTimeout(() => menu.classList.add('hidden'), 200);
                            icon.style.transform = 'rotate(0deg)';
                        }
                    });
                }

    <div id="menu-panel" class="absolute right-0 top-0 bottom-0 w-64 bg-white shadow-xl transform translate-x-full transition-transform duration-300 flex flex-col">

                css: `/* Mobile Menu Transitions */
/* Panel Slide: translate-x-full -> translate-x-0 */
/* Overlay Fade: opacity-0 -> opacity-100 */`,
                script: () => {
                    const trigger = document.getElementById('menu-trigger');
                    const close = document.getElementById('menu-close');
                    const overlay = document.getElementById('mobile-menu');
                    const panel = document.getElementById('menu-panel');

                    trigger.addEventListener('click', () => {
                        overlay.classList.remove('hidden');
                        // Allow display:block to apply before changing opacity for transition
                        requestAnimationFrame(() => {
                            overlay.classList.remove('opacity-0');
                            panel.classList.remove('translate-x-full');

                    const closeMenu = () => {
                        panel.classList.add('translate-x-full');
                        overlay.classList.add('opacity-0');
                        setTimeout(() => {

                        }, 300);

            },

      <p class="text-sm text-slate-600 mb-6 leading-relaxed">

      </p>
      <div class="flex justify-end gap-2">
        <button id="modal-cancel" class="px-3 py-2 text-xs font-medium text-slate-700 bg-slate-100 rounded hover:bg-slate-200 transition">Cancel</button>

                css: `/* Modal Animations */
/* Overlay: opacity-0 -> opacity-100 */
/* Content: scale-95 -> scale-100 */`,
                script: () => {
                    const openBtn = document.getElementById('modal-open');
                    const overlay = document.getElementById('modal-overlay');
                    const content = document.getElementById('modal-content');
                    const closeBtns = [
                        document.getElementById('modal-close'), 
                        document.getElementById('modal-cancel')
                    ];

                    openBtn.addEventListener('click', () => {
                        overlay.classList.remove('hidden');
                        requestAnimationFrame(() => {
                            overlay.classList.remove('opacity-0');
                            content.classList.remove('scale-95');
                            content.classList.add('scale-100');
                        });
                    });

                    const closeModal = () => {
                        overlay.classList.add('opacity-0');
                        content.classList.remove('scale-100');
                        content.classList.add('scale-95');
                        setTimeout(() => {
                            overlay.classList.add('hidden');
                        }, 300);
                    };

                    closeBtns.forEach(btn => btn.addEventListener('click', closeModal));
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) closeModal();
                    });
                }
            },

                desc: "Simulate 버튼을 눌러 진행 상태를 시뮬레이션할 수 있습니다.",
                html: `<div class="w-full space-y-6">
  <div>
    <div class="flex justify-between mb-1">

      <span id="progress-text" class="text-xs font-medium text-blue-600">0%</span>
    </div>
    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
      <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
    </div>
  </div>
  <button id="start-progress" class="w-full py-2 bg-white border border-slate-300 text-slate-700 text-xs font-medium rounded hover:bg-slate-50 active:scale-95 transition">
    Simulate Download
  </button>
</div>`,
                css: `/* Tailwind Utility Classes Only */`,
                script: () => {
                    const bar = document.getElementById('progress-bar');
                    const text = document.getElementById('progress-text');
                    const btn = document.getElementById('start-progress');
                    
                    btn.addEventListener('click', () => {
                        let width = 0;
                        btn.disabled = true;
                        btn.innerText = "Downloading...";
                        
                        const interval = setInterval(() => {
                            if (width >= 100) {
                                clearInterval(interval);
                                btn.disabled = false;
                                btn.innerText = "Done (Click to Reset)";
                                width = 100;
                            } else {
                                width += Math.random() * 10;
                                if(width > 100) width = 100;
                            }
                            bar.style.width = width + '%';
                            text.innerText = Math.floor(width) + '%';
                            
                            if (width === 100) {
                                setTimeout(() => {
                                     btn.onclick = () => {
                                         bar.style.width = '0%';
                                         text.innerText = '0%';
                                         btn.innerText = "Simulate Download";
                                         btn.onclick = null; // Remove temp handler to fall back to main listener
                                     }
                                }, 500);
                            }
                        }, 200);
                    });
                }
            },

        let currentComponent = components[0];
        let currentTab = 'preview';

        function init() {
            const menuList = document.getElementById('menu-list');
            
            components.forEach((comp, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <button onclick="selectComponent(${comp.id})" class="w-full text-left px-3 py-2 text-sm rounded-md transition-colors ${index === 0 ? 'bg-slate-200 font-semibold text-slate-900' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}">
                        ${comp.id}. ${comp.name}
                    </button>
                `;
                menuList.appendChild(li);
            });
            
            render();
        }

        function selectComponent(id) {
            currentComponent = components.find(c => c.id === id);
            
            const buttons = document.querySelectorAll('#menu-list button');
            buttons.forEach(btn => {
                if(btn.innerText.includes(`${id}. ${currentComponent.name}`)) {
                    btn.className = 'w-full text-left px-3 py-2 text-sm rounded-md transition-colors bg-slate-200 font-semibold text-slate-900';
                } else {
                    btn.className = 'w-full text-left px-3 py-2 text-sm rounded-md transition-colors text-slate-600 hover:bg-slate-100 hover:text-slate-900';
                }
            });

            render();
        }

        function render() {
            // Setup Text
            document.getElementById('current-title').innerText = currentComponent.name;
            document.getElementById('view-title').innerText = currentComponent.name;
            document.getElementById('view-desc').innerText = currentComponent.desc;
            
            // Render HTML
            const renderTarget = document.getElementById('render-target');
            renderTarget.innerHTML = currentComponent.html;
            
            // Show Code
            let codeDisplay = currentComponent.html;
            if (currentComponent.script) {
                const scriptStr = currentComponent.script.toString();
                const scriptBody = scriptStr.substring(scriptStr.indexOf("{") + 1, scriptStr.lastIndexOf("}"));
                codeDisplay += `\n\n<script>\n  // Logic for ${currentComponent.name}\n${scriptBody}<\/script>`;
            }
            document.getElementById('code-html').innerText = codeDisplay;
            
            // CSS Code Display
            document.getElementById('code-css').innerText = currentComponent.css || "/* No custom CSS required (Tailwind Used) */";
            
            // Execute Script if exists
            if (currentComponent.script) {
                try {
                    currentComponent.script();
                } catch (e) {
                    console.error("Script Error:", e);
                }
            }

            // Re-init Icons
            lucide.createIcons();
            switchTab('preview');
        }

        function switchTab(type) {
            currentTab = type;
            const tabs = ['preview', 'html', 'css'];
            tabs.forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                const tabBtn = document.getElementById(`tab-${t}`);
                tabBtn.classList.remove('tab-active');
                tabBtn.classList.add('text-slate-500');
            });
            
            document.getElementById(`content-${type}`).classList.remove('hidden');
            const activeBtn = document.getElementById(`tab-${type}`);
            activeBtn.classList.add('tab-active');
            activeBtn.classList.remove('text-slate-500');
        }

        function copyCurrentCode() {
            let code = "";
            if (currentTab === 'css') {
                code = currentComponent.css || "/* No custom CSS */";
            } else {
                code = document.getElementById('code-html').innerText;
            }
            navigator.clipboard.writeText(code).then(() => {
                alert(`${currentTab.toUpperCase()} 코드가 클립보드에 복사되었습니다.`);
            });
        }

        window.onload = init;
    </script>
</body>
