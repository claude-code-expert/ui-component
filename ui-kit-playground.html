<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Kit Playground — 32 컴포넌트 + 공통 오버레이</title>
<!--
  폰트: IBM Plex Sans / IBM Plex Mono
  이유 — IBM이 기술 제품 UI를 위해 설계한 서체. 개발자 대상 컴포넌트 레퍼런스라는
  목적에 맞고, 본문(Sans)과 코드(Mono)를 같은 가족으로 묶어 타이포 위계를 일관되게 한다.
  (anti-ai-slop: Inter/Roboto/Arial/system 기본값 수렴 금지 규칙에 따른 의도적 선택)
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f8fafc;
    --surface-2: #eef2f6;
    --border: #e5e7eb;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --muted: #64748b;
    --dim: #94a3b8;
    --accent: #2563eb;       /* 단일 액센트 — 상호작용·활성 상태에만 */
    --accent-strong: #1d4ed8;
    --accent-weak: #eff6ff;
    --code-bg: #0f172a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  /* ── 레이아웃 ── */
  .kit-app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

  /* ── 사이드바 ── */
  .kit-sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column;
    height: 100vh; min-height: 0;
  }
  .kit-brand { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); }
  .kit-brand h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .kit-brand p { margin: 3px 0 0; font-size: 12px; color: var(--muted); }
  .kit-search {
    margin: 12px; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    font: inherit; font-size: 13px; color: var(--text); background: var(--bg);
  }
  .kit-search::placeholder { color: var(--dim); }
  .kit-search:focus { outline: none; border-color: var(--accent); }
  .kit-nav { flex: 1; overflow-y: auto; padding: 2px 8px 24px; }
  .kit-group-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--dim); padding: 14px 12px 6px;
  }
  .kit-item {
    width: 100%; text-align: left;
    display: flex; align-items: baseline; gap: 8px;
    padding: 7px 12px; cursor: pointer;
    font: inherit; font-size: 13px; color: var(--muted);
    background: none; border: none;
  }
  .kit-item:hover { background: var(--surface-2); color: var(--text); }
  /* 활성 표시는 색·테두리·라디우스 없이 굵기와 명도(위계)로만 — anti-ai-slop 준수 */
  .kit-item.active { color: var(--text); font-weight: 600; }
  .kit-item .kit-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--dim); min-width: 18px; }
  .kit-item.active .kit-num { color: var(--text); }
  .kit-item .kit-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kit-item .kit-ko { font-size: 11px; color: var(--dim); font-weight: 400; }
  .kit-item.hidden { display: none; }

  /* ── 메인 ── */
  .kit-main { overflow-y: auto; height: 100vh; }
  .kit-head {
    position: sticky; top: 0; z-index: 5;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 14px 32px; font-size: 12px; color: var(--muted);
  }
  .kit-head b { color: var(--text); font-weight: 600; }
  .kit-body { max-width: 940px; padding: 32px; }

  .kit-title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  #kit-title { margin: 0; font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  .kit-title-ko { font-size: 15px; color: var(--muted); font-weight: 400; }
  .kit-badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 3px 8px; border: 1px solid var(--border-strong); border-radius: 4px; color: var(--muted);
  }
  #kit-desc { margin: 12px 0 0; font-size: 15px; color: #334155; line-height: 1.65; max-width: 720px; }
  .kit-meta { margin-top: 14px; display: flex; flex-direction: column; gap: 4px; }
  .kit-meta div { font-size: 13px; color: var(--muted); }
  .kit-meta b { color: var(--text); font-weight: 600; display: inline-block; min-width: 76px; }

  /* ── 탭 ── */
  .kit-tabs { margin-top: 26px; display: flex; gap: 2px; border-bottom: 1px solid var(--border); }
  .kit-tab {
    background: none; border: none; padding: 9px 14px;
    font: inherit; font-size: 13px; font-weight: 500; color: var(--muted);
    cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .kit-tab:hover { color: var(--text); }
  .kit-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .kit-panel { display: none; }
  .kit-panel.active { display: block; }

  /* ── 프리뷰 ── */
  .kit-preview {
    margin-top: 20px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); padding: 36px 24px; min-height: 220px;
    display: flex; align-items: center; justify-content: center;
  }
  #kit-preview-host { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 16px; width: 100%; }

  /* ── 코드 블록 ── */
  .kit-code-wrap {
    margin-top: 20px; position: relative;
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .kit-code-copy {
    position: absolute; top: 10px; right: 10px;
    background: #1e293b; color: #cbd5e1; border: 1px solid #334155;
    border-radius: 4px; padding: 4px 10px; font: inherit; font-size: 12px; cursor: pointer;
    transition: color .15s ease, border-color .15s ease;
  }
  .kit-code-copy:hover { color: #fff; border-color: #475569; }
  .kit-code-copy.copied { color: #4ade80; border-color: #4ade80; }
  pre.kit-code { margin: 0; padding: 18px 20px; background: var(--code-bg); overflow-x: auto; }
  pre.kit-code code {
    font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; line-height: 1.7;
    color: #cbd5e1; white-space: pre;
  }
  /* 코드 토큰 색 — 정보(토큰 종류)를 전달하므로 의미색으로 허용 */
  .tok-comment { color: #64748b; font-style: italic; }
  .tok-tag, .tok-kw { color: #7aa2f7; }
  .tok-attr, .tok-prop { color: #9aa5ce; }
  .tok-string { color: #9ece6a; }
  .tok-value, .tok-num { color: #e0af68; }
  .tok-selector { color: #7dcfff; }
  .tok-punct { color: #6b7394; }

  /* Lucide 아이콘 — 이모지/글리프 대체, 컨텍스트 글자크기에 맞춰 스케일 */
  #kit-preview-host svg.lucide { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; }
  #kit-preview-host i[data-lucide] { display: inline-block; width: 1em; height: 1em; }

  /* ── 반응형 ── */
  @media (max-width: 820px) {
    .kit-app { grid-template-columns: 1fr; height: auto; }
    .kit-sidebar { height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .kit-nav { max-height: 220px; }
    .kit-main { height: auto; }
    .kit-body { padding: 24px 16px; }
  }
</style>
<!-- 현재 선택된 컴포넌트의 CSS가 여기에 주입된다(보여주는 코드 = 적용되는 코드) -->
<style id="live-style"></style>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="kit-app">
  <aside class="kit-sidebar">
    <div class="kit-brand">
      <h1>UI Kit Playground v.1.1</h1>
      <p>32 컴포넌트 + 공통 오버레이</p>
    </div>
    <input type="text" class="kit-search" id="kit-search" placeholder="컴포넌트 검색…">
    <nav class="kit-nav" id="kit-nav"></nav>
  </aside>

  <main class="kit-main">
    <header class="kit-head">UI Kit / <b id="kit-crumb-cur">—</b></header>
    <div class="kit-body">
      <div class="kit-title-row">
        <h1 id="kit-title">—</h1>
        <span class="kit-title-ko" id="kit-title-ko"></span>
        <span class="kit-badge" id="kit-cat"></span>
      </div>
      <p id="kit-desc"></p>
      <div class="kit-meta">
        <div><b>사용 사례</b><span id="kit-usecase"></span></div>
        <div><b>담당 기능</b><span id="kit-feature"></span></div>
      </div>

      <div class="kit-tabs">
        <button class="kit-tab active" data-tab="preview">Preview</button>
        <button class="kit-tab" data-tab="html">HTML</button>
        <button class="kit-tab" data-tab="css">CSS</button>
        <button class="kit-tab" id="tab-js" data-tab="js">JS</button>
      </div>

      <div class="kit-panel active" data-panel="preview">
        <div class="kit-preview"><div id="kit-preview-host"></div></div>
      </div>
      <div class="kit-panel" data-panel="html">
        <div class="kit-code-wrap">
          <button class="kit-code-copy" data-target="code-html">복사</button>
          <pre class="kit-code"><code id="code-html"></code></pre>
        </div>
      </div>
      <div class="kit-panel" data-panel="css">
        <div class="kit-code-wrap">
          <button class="kit-code-copy" data-target="code-css">복사</button>
          <pre class="kit-code"><code id="code-css"></code></pre>
        </div>
      </div>
      <div class="kit-panel" data-panel="js">
        <div class="kit-code-wrap">
          <button class="kit-code-copy" data-target="code-js">복사</button>
          <pre class="kit-code"><code id="code-js"></code></pre>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ===== 컴포넌트 데이터 (32개) — 자동 주입 =====
const components = [
  { id: 'accordion', num: 1, name: 'Accordion', nameKo: '아코디언', cat: 'container',
    desc: '제목을 클릭하면 섹션이 펼쳐지거나 접히는 컴포넌트. 좁은 공간에 많은 정보를 단계적으로 노출할 수 있다.',
    usecase: 'FAQ · 상품 상세 설명 · 설정 메뉴',
    feature: '콘텐츠 토글 / 단계적 정보 노출 (Progressive Disclosure)',
    html: `<div class="accordion">
  <div class="accordion-item open">
    <button class="accordion-header">결제는 어떻게 하나요?<i data-lucide="plus" class="acc-ic"></i></button>
    <div class="accordion-body">신용카드, 계좌이체, 간편결제를 지원합니다.</div>
  </div>
  <div class="accordion-item">
    <button class="accordion-header">배송은 얼마나 걸리나요?<i data-lucide="plus" class="acc-ic"></i></button>
    <div class="accordion-body">평일 오후 2시 이전 주문 시 당일 출고됩니다.</div>
  </div>
  <div class="accordion-item">
    <button class="accordion-header">환불 정책이 궁금합니다<i data-lucide="plus" class="acc-ic"></i></button>
    <div class="accordion-body">수령 후 7일 이내 무료 반품 가능합니다.</div>
  </div>
</div>`,
    css: `.accordion { width: 320px; max-width: 100%; }
.accordion-item { border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 6px; overflow: hidden; background: #fff; }
.accordion-header {
  width: 100%; text-align: left; background: #fff; border: none;
  padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
}
.accordion-header .acc-ic { color: #64748b; transition: transform .15s ease; }
.accordion-item.open .accordion-header .acc-ic { transform: rotate(45deg); }
.accordion-body { display: none; padding: 4px 14px 12px; color: #64748b; font-size: 12px; }
.accordion-item.open .accordion-body { display: block; }`,
    js: `document.querySelectorAll('.accordion').forEach(acc => {
  acc.querySelectorAll('.accordion-header').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = btn.parentElement;
      const willOpen = !item.classList.contains('open');
      // 아코디언 바 동작: 같은 그룹의 다른 항목은 모두 닫고 클릭한 항목만 토글
      acc.querySelectorAll('.accordion-item').forEach(i => i.classList.remove('open'));
      if (willOpen) item.classList.add('open');
    });
  });
});` },

  { id: 'bento', num: 2, name: 'Bento Menu', nameKo: '벤토 메뉴', cat: 'nav',
    desc: '도시락(벤토) 칸막이처럼 격자 형태로 항목을 나열한 메뉴. 여러 앱/기능을 한 화면에 노출할 때 사용.',
    usecase: 'Google 앱 런처 · MS 365 앱 스위처',
    feature: '그리드 형태의 앱·기능 진입점 제공',
    html: `<div class="bento-wrap">
  <button class="bento-trigger" aria-label="앱 메뉴 열기">
    <span class="brow"><span class="bdot"></span><span class="bdot"></span><span class="bdot"></span></span>
    <span class="brow"><span class="bdot"></span><span class="bdot"></span><span class="bdot"></span></span>
    <span class="brow"><span class="bdot"></span><span class="bdot"></span><span class="bdot"></span></span>
  </button>
  <div class="bento-popover">
    <div class="bapp" title="메일"><i data-lucide="mail"></i></div>
    <div class="bapp" title="캘린더"><i data-lucide="calendar"></i></div>
    <div class="bapp" title="드라이브"><i data-lucide="folder"></i></div>
    <div class="bapp" title="문서"><i data-lucide="file-text"></i></div>
    <div class="bapp" title="채팅"><i data-lucide="message-circle"></i></div>
    <div class="bapp" title="지도"><i data-lucide="map"></i></div>
  </div>
</div>`,
    css: `.bento-wrap { position: relative; display: inline-block; }
.bento-trigger {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 6px; cursor: pointer; display: flex; flex-direction: column; gap: 3px;
}
.bento-trigger .brow { display: flex; gap: 3px; }
.bento-trigger .bdot { width: 5px; height: 5px; background: #0f172a; border-radius: 1px; }
.bento-popover {
  display: none; position: absolute; background: #fff;
  border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px;
  box-shadow: 0 8px 24px rgba(15,23,42,.08);
  grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 6px; z-index: 10;
}
.bento-wrap.open .bento-popover { display: grid; }
.bento-popover .bapp {
  width: 48px; height: 48px; background: #f1f5f9; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer;
}
.bento-popover .bapp:hover { background: #dbeafe; }`,
    js: `document.querySelectorAll('.bento-trigger').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    btn.parentElement.classList.toggle('open');
  });
});
document.addEventListener('click', () => {
  document.querySelectorAll('.bento-wrap.open').forEach(w => w.classList.remove('open'));
});` },

  { id: 'breadcrumb', num: 3, name: 'Breadcrumb', nameKo: '브레드크럼', cat: 'nav',
    desc: '사이트 계층 구조에서 현재 위치를 표시하고 상위 경로로 돌아갈 수 있게 하는 링크 경로.',
    usecase: '이커머스 카테고리 · 문서/위키 네비게이션',
    feature: '현재 위치 표시 / 상위 경로 역추적',
    html: `<nav class="breadcrumb" aria-label="breadcrumb">
  <a href="#">홈</a>
  <span class="sep">/</span>
  <a href="#">전자제품</a>
  <span class="sep">/</span>
  <a href="#">노트북</a>
  <span class="sep">/</span>
  <span class="current">맥북 프로 16</span>
</nav>`,
    css: `.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: #64748b; flex-wrap: wrap;
}
.breadcrumb a { color: #2563eb; text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb .sep { color: #cbd5e1; }
.breadcrumb .current { color: #0f172a; font-weight: 500; }`,
    js: '' },

  { id: 'button', num: 4, name: 'Button', nameKo: '버튼', cat: 'input',
    desc: '라벨이 붙은 클릭 가능한 영역. 액션을 명확하게 트리거하는 가장 기본적인 입력 컴포넌트.',
    usecase: '제출 · 저장 · 결제 · CTA',
    feature: '사용자 액션 트리거 / 시각적 위계(Primary/Secondary/Danger) 표현',
    html: `<button class="btn btn-primary">저장</button>
<button class="btn btn-secondary">취소</button>
<button class="btn btn-danger">삭제</button>
<button class="btn btn-primary" disabled>비활성</button>`,
    css: `.btn {
  padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent; font-family: inherit;
  transition: all .15s ease;
}
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: #fff; color: #0f172a; border-color: #e2e8f0; }
.btn-secondary:hover { background: #f8fafc; }
.btn-danger { background: #dc2626; color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn:disabled { opacity: .5; cursor: not-allowed; }`,
    js: `document.querySelectorAll('.btn:not(:disabled)').forEach(btn => {
  btn.addEventListener('click', () => console.log('Clicked:', btn.textContent));
});` },

  { id: 'card', num: 5, name: 'Card', nameKo: '카드', cat: 'container',
    desc: '이미지·텍스트·버튼 등 이질적인 콘텐츠를 하나의 직사각형 단위로 묶어 진입점 역할을 하는 모듈.',
    usecase: '상품 목록 · 블로그 미리보기 · 대시보드 위젯',
    feature: '콘텐츠 묶음 + 클릭 진입점 / 그리드 레이아웃의 기본 단위',
    html: `<div class="product-card">
  <div class="pc-image"></div>
  <div class="pc-body">
    <h3 class="pc-title">맥북 프로 16</h3>
    <p class="pc-desc">M3 Pro · 36GB · 512GB</p>
    <div class="pc-price">₩3,490,000</div>
  </div>
</div>
<div class="product-card">
  <div class="pc-image" style="background:#e8eaf0;"></div>
  <div class="pc-body">
    <h3 class="pc-title">아이패드 프로</h3>
    <p class="pc-desc">M4 · 11형 · 256GB</p>
    <div class="pc-price">₩1,499,000</div>
  </div>
</div>`,
    css: `.product-card {
  width: 160px; background: #fff; border: 1px solid #e2e8f0;
  border-radius: 8px; overflow: hidden; cursor: pointer;
  transition: box-shadow .15s ease;
}
.product-card:hover { box-shadow: 0 4px 12px rgba(15,23,42,.08); }
.product-card .pc-image { height: 90px; background: #dbe4f2; }
.product-card .pc-body { padding: 10px; }
.product-card .pc-title { font-size: 13px; font-weight: 600; margin: 0 0 4px; }
.product-card .pc-desc { font-size: 12px; color: #64748b; margin: 0 0 6px; }

    css: `.carousel { width: 100%; max-width: 320px; position: relative; }
.carousel-track { display: flex; overflow: hidden; border-radius: 8px; background: #f1f5f9; }
.carousel-slide {
  min-width: 100%; height: 100px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 700; color: #fff;
  transition: margin-left .15s ease;
}
.carousel-slide.s1 { background: #2563eb; }
.carousel-slide.s2 { background: #475569; }
.carousel-slide.s3 { background: #0f172a; }
.carousel-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.carousel-btn {
  background: #fff; border: 1px solid #e2e8f0;
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; font-size: 14px;

.carousel-dots { display: flex; gap: 6px; }
.carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; cursor: pointer; }
.carousel-dot.active { background: #2563eb; }`,
    js: `(function() {
  const car = document.getElementById('carousel-demo');
  if (!car) return;
  const slides = car.querySelectorAll('.carousel-slide');
  const dots = car.querySelectorAll('.carousel-dot');
  let idx = 0;
  function go(i) {
    idx = (i + slides.length) % slides.length;
    slides[0].style.marginLeft = (-idx * 100) + '%';
    dots.forEach((d, j) => d.classList.toggle('active', j === idx));
  }
  car.querySelector('.prev').addEventListener('click', () => go(idx - 1));
  car.querySelector('.next').addEventListener('click', () => go(idx + 1));
  dots.forEach(d => d.addEventListener('click', () => go(+d.dataset.i)));
})();` },

    html: `<div class="pagination" id="pg-demo">
  <button class="pg-btn" data-act="prev"><i data-lucide="chevron-left"></i></button>
  <button class="pg-btn active" data-i="1">1</button>

  <button class="pg-btn" data-i="3">3</button>
  <button class="pg-btn" data-i="4">4</button>
  <button class="pg-btn" data-i="5">5</button>
  <button class="pg-btn" data-act="next"><i data-lucide="chevron-right"></i></button>
</div>`,
    css: `.pagination { display: flex; gap: 4px; align-items: center; }
.pg-btn {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 6px;
  min-width: 32px; height: 32px; padding: 0 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
}
.pg-btn:hover:not(:disabled) { background: #f1f5f9; }
.pg-btn:disabled { opacity: .4; cursor: not-allowed; }
.pg-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }`,
    js: `(function() {
  const pg = document.getElementById('pg-demo');
  if (!pg) return;
  const total = 5;
  let cur = 1;
  function set(n) {
    cur = Math.max(1, Math.min(total, n));
    pg.querySelectorAll('.pg-btn[data-i]').forEach(b => {
      b.classList.toggle('active', +b.dataset.i === cur);
    });
    pg.querySelector('[data-act="prev"]').disabled = cur === 1;
    pg.querySelector('[data-act="next"]').disabled = cur === total;
  }
  pg.addEventListener('click', e => {
    const b = e.target.closest('.pg-btn');
    if (!b) return;
    if (b.dataset.act === 'prev') set(cur - 1);
    else if (b.dataset.act === 'next') set(cur + 1);
    else if (b.dataset.i) set(+b.dataset.i);
  });
  set(1);
})();` },

  { id: 'picker', num: 22, name: 'Picker', nameKo: '피커 (날짜)', cat: 'input',
    desc: '날짜·시간 등 포맷이 정해진 값을 표준화된 UI로 선택. 자유 입력 대비 데이터 무결성을 확보한다.',
    usecase: '예약 시스템 · 일정 등록 · 생년월일 입력',
    feature: '표준 포맷 강제 / 입력 오류 감소',
    html: `<div class="picker-wrap" id="picker-demo">
  <input type="text" class="picker-input" id="picker-input" readonly placeholder="날짜 선택">
  <div class="picker-calendar">
    <div class="picker-header">
      <button data-act="prev"><i data-lucide="chevron-left"></i></button>
      <span class="month"></span>
      <button data-act="next"><i data-lucide="chevron-right"></i></button>
    </div>
    <div class="picker-grid"></div>
  </div>
</div>`,
    css: `.picker-wrap { position: relative; }
.picker-input {
  border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 8px 12px; font-size: 13px; cursor: pointer;
  background: #fff; width: 160px;
}
.picker-calendar {
  display: none; position: absolute; top: 100%; left: 0; margin-top: 4px;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
  box-shadow: 0 8px 24px rgba(15,23,42,.08); padding: 12px; z-index: 10;
}
.picker-wrap.open .picker-calendar { display: block; }
.picker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.picker-header button {
  background: transparent; border: none;
  font-size: 14px; cursor: pointer; color: #64748b; padding: 4px 8px;
}
.picker-header .month { font-size: 13px; font-weight: 700; }
.picker-grid { display: grid; grid-template-columns: repeat(7, 28px); gap: 2px; }
.picker-grid .pday-head {
  font-size: 10px; font-weight: 600;
  color: #94a3b8; text-align: center; padding: 4px 0;
}
.picker-grid .pday {
  width: 28px; height: 28px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer;
}
.picker-grid .pday:hover { background: #f1f5f9; }
.picker-grid .pday.selected { background: #2563eb; color: #fff; font-weight: 700; }
.picker-grid .pday.empty { visibility: hidden; }`,
    js: `(function() {
  const wrap = document.getElementById('picker-demo');
  if (!wrap) return;
  const input = wrap.querySelector('.picker-input');
  const grid = wrap.querySelector('.picker-grid');
  const monthEl = wrap.querySelector('.month');
  const today = new Date();
  let view = new Date(today.getFullYear(), today.getMonth(), 1);
  let selected = null;
  function render() {
    monthEl.textContent = view.getFullYear() + '년 ' + (view.getMonth() + 1) + '월';
    grid.innerHTML = '';
    ['일','월','화','수','목','금','토'].forEach(d => {
      const h = document.createElement('div');
      h.className = 'pday-head'; h.textContent = d;
      grid.appendChild(h);
    });
    const firstDay = view.getDay();
    const daysInMonth = new Date(view.getFullYear(), view.getMonth() + 1, 0).getDate();
    for (let i = 0; i < firstDay; i++) {
      const e = document.createElement('div');
      e.className = 'pday empty'; grid.appendChild(e);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const day = document.createElement('div');
      day.className = 'pday'; day.textContent = d;
      if (selected && selected.getFullYear() === view.getFullYear() &&
          selected.getMonth() === view.getMonth() && selected.getDate() === d) {
        day.classList.add('selected');
      }
      day.addEventListener('click', () => {
        selected = new Date(view.getFullYear(), view.getMonth(), d);
        input.value = selected.toISOString().slice(0, 10);
        wrap.classList.remove('open');
        render();
      });
      grid.appendChild(day);
    }
  }
  input.addEventListener('click', e => {
    e.stopPropagation();
    wrap.classList.toggle('open');
  });
  wrap.querySelector('[data-act="prev"]').addEventListener('click', e => {
    e.stopPropagation();
    view.setMonth(view.getMonth() - 1); render();
  });
  wrap.querySelector('[data-act="next"]').addEventListener('click', e => {
    e.stopPropagation();
    view.setMonth(view.getMonth() + 1); render();
  });
  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) wrap.classList.remove('open');
  });
  render();
})();` },

    css: `.stepper {
  display: flex; align-items: center;
  border: 1px solid #e2e8f0; border-radius: 6px;
  overflow: hidden; width: fit-content; background: #fff;
}
.stepper button {
  background: #fff; border: none;
  width: 32px; height: 32px;
  font-size: 16px; font-weight: 700; cursor: pointer;
}
.stepper button:hover:not(:disabled) { background: #f1f5f9; }
.stepper button:disabled { color: #cbd5e1; cursor: not-allowed; }
.stepper .stepper-value {
  min-width: 40px; text-align: center;
  font-size: 13px; font-weight: 600;
  border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0;
  padding: 6px 8px;
}`,
    js: `(function() {
  const st = document.getElementById('stepper-demo');
  if (!st) return;
  const val = st.querySelector('.stepper-value');
  const minus = st.querySelector('[data-act="-"]');
  const plus = st.querySelector('[data-act="+"]');
  const MIN = 1, MAX = 99;
  function update() {
    const n = +val.textContent;
    minus.disabled = n <= MIN;
    plus.disabled = n >= MAX;
  }
  minus.addEventListener('click', () => {
    const n = +val.textContent;
    if (n > MIN) { val.textContent = n - 1; update(); }
  });
  plus.addEventListener('click', () => {
    const n = +val.textContent;
    if (n < MAX) { val.textContent = n + 1; update(); }
  });
  update();
})();` },

// ===== 프레임워크 =====
const ALL = components.concat(overlays);
const GROUPS = [
  { key: 'overlay',   label: '오버레이 · 알림' },
  { key: 'input',     label: 'Input Controls' },
  { key: 'nav',       label: 'Navigation' },
  { key: 'info',      label: 'Information' },
  { key: 'container', label: 'Container' }
];
const CAT_BADGE = { input: 'Input', nav: 'Navigation', info: 'Information', container: 'Container', overlay: 'Overlay' };

// ── 간이 구문 하이라이터 ──
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function span(cls, text) { return '<span class="' + cls + '">' + esc(text) + '</span>'; }

function hlTag(m) {
  let out = '', mm, first = true;
  const re = /(<\/?)|([a-zA-Z][\w-]*)|(=)|("[^"]*"|'[^']*')|(\/?>)|(\s+)/g;
  while ((mm = re.exec(m))) {
    if (mm[1]) out += span('tok-punct', mm[1]);
    else if (mm[2]) { out += first ? span('tok-tag', mm[2]) : span('tok-attr', mm[2]); first = false; }
    else if (mm[3]) out += '=';
    else if (mm[4]) out += span('tok-string', mm[4]);
    else if (mm[5]) out += span('tok-punct', mm[5]);
    else if (mm[6]) out += mm[6];
  }
  return out;
}
function hlHtml(s) {
  let out = '';
  s.replace(/<!--[\s\S]*?-->|<\/?[a-zA-Z][^>]*>|[^<]+/g, m => {
    if (m.slice(0, 4) === '<!--') out += span('tok-comment', m);
    else if (m[0] === '<') out += hlTag(m);
    else out += esc(m);
    return m;
  });
  return out;
}
function hlCss(s) {
  let out = '', mm, inBlock = false, expectVal = false;
  const re = /(\/\*[\s\S]*?\*\/)|("[^"]*"|'[^']*')|([.#@]?[\w-]+)|(\{|\}|:|;|,)|(\s+)|([^\s])/g;
  while ((mm = re.exec(s))) {
    if (mm[1]) out += span('tok-comment', mm[1]);
    else if (mm[2]) out += span('tok-string', mm[2]);
    else if (mm[3]) {
      if (!inBlock) out += span('tok-selector', mm[3]);
      else if (expectVal) out += span('tok-value', mm[3]);
      else out += span('tok-prop', mm[3]);
    } else if (mm[4]) {
      if (mm[4] === '{') { inBlock = true; expectVal = false; }
      else if (mm[4] === '}') { inBlock = false; expectVal = false; }
      else if (mm[4] === ':') expectVal = true;
      else if (mm[4] === ';') expectVal = false;
      out += span('tok-punct', mm[4]);
    } else if (mm[5]) out += mm[5];
    else if (mm[6]) out += esc(mm[6]);
  }
  return out;
}
const JS_KW = new Set(['const','let','var','function','return','if','else','for','while','do','new','try','catch','await','async','of','in','typeof','true','false','null','undefined','class','this','break','continue']);
function hlJs(s) {
  let out = '', mm;
  const re = /(\/\/[^\n]*|\/\*[\s\S]*?\*\/)|(`[^`]*`|"[^"]*"|'[^']*')|(\b\d[\w.]*)|([A-Za-z_$][\w$]*)|(\s+)|([^\s])/g;
  while ((mm = re.exec(s))) {
    if (mm[1]) out += span('tok-comment', mm[1]);
    else if (mm[2]) out += span('tok-string', mm[2]);
    else if (mm[3]) out += span('tok-num', mm[3]);
    else if (mm[4]) out += JS_KW.has(mm[4]) ? span('tok-kw', mm[4]) : esc(mm[4]);
    else if (mm[5]) out += mm[5];
    else if (mm[6]) out += esc(mm[6]);
  }
  return out;
}
function highlight(code, lang) {
  if (lang === 'html') return hlHtml(code);
  if (lang === 'css') return hlCss(code);
  if (lang === 'js') return hlJs(code);
  return esc(code);
}

// ── 사이드바 구성 ──
const navEl = document.getElementById('kit-nav');
GROUPS.forEach(g => {
  const items = ALL.filter(i => i.cat === g.key);
  if (!items.length) return;
  const lbl = document.createElement('div');
  lbl.className = 'kit-group-label';
  lbl.textContent = g.label;
  navEl.appendChild(lbl);
  items.forEach(it => {
    const b = document.createElement('button');
    b.className = 'kit-item';
    b.dataset.id = it.id;
    b.dataset.search = (it.name + ' ' + it.nameKo).toLowerCase();
    b.innerHTML = '<span class="kit-num">' + String(it.num).padStart(2, '0') + '</span>'
      + '<span class="kit-item-name">' + it.name + '</span>'
      + '<span class="kit-ko">' + it.nameKo + '</span>';
    b.addEventListener('click', () => select(it.id));
    navEl.appendChild(b);
  });
});

// ── 선택 · 렌더 ──
const liveStyle = document.getElementById('live-style');
function select(id) {
  const it = ALL.find(x => x.id === id);
  if (!it) return;
  document.querySelectorAll('.kit-item').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  document.getElementById('kit-crumb-cur').textContent = it.name;
  document.getElementById('kit-title').textContent = it.name;
  document.getElementById('kit-title-ko').textContent = it.nameKo;
  document.getElementById('kit-cat').textContent = CAT_BADGE[it.cat];
  document.getElementById('kit-desc').textContent = it.desc;
  document.getElementById('kit-usecase').textContent = it.usecase;
  document.getElementById('kit-feature').textContent = it.feature;

  liveStyle.textContent = it.css || '';
  document.getElementById('kit-preview-host').innerHTML = it.html;
  if (window.lucide) lucide.createIcons();

  document.getElementById('code-html').innerHTML = highlight(it.html, 'html');
  document.getElementById('code-css').innerHTML = highlight(it.css || '/* 별도 CSS 없음 */', 'css');
  document.getElementById('tab-js').style.display = it.js ? '' : 'none';
  document.getElementById('code-js').innerHTML = highlight(it.js || '', 'js');

  if (it.js) {
    try { new Function(it.js)(); }
    catch (e) { console.warn('[' + it.id + '] JS error:', e); }
  }
  switchTab('preview');
}

// ── 탭 ──
function switchTab(name) {
  document.querySelectorAll('.kit-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.kit-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === name));
}
document.querySelectorAll('.kit-tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

// ── 복사 ──
document.querySelectorAll('.kit-code-copy').forEach(btn => {
  btn.addEventListener('click', async () => {
    const code = document.getElementById(btn.dataset.target).textContent;
    try {
      await navigator.clipboard.writeText(code);
    } catch (e) {
      const ta = document.createElement('textarea');
      ta.value = code; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
    }
    const old = btn.textContent;
    btn.textContent = '복사됨'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = old; btn.classList.remove('copied'); }, 1500);
  });
});

// ── 검색 ──
document.getElementById('kit-search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.kit-item').forEach(b => {
    b.classList.toggle('hidden', !!q && !b.dataset.search.includes(q));
  });
});

// ── 초기 진입 ──
select(ALL[0].id);
</script>
