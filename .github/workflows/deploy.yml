name: Deploy to GitHub Pages

# main에 푸시될 때마다 정적 사이트(앱)를 GitHub Pages로 배포한다.
# 빌드 도구가 없으므로 앱 파일(index.html + styles/js/data)만 모아 그대로 게시.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 배포(이전 진행 중 배포는 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site (앱 파일만 — 내부 문서/프롬프트 이력 제외)
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r styles js data _site/
          touch _site/.nojekyll   # Jekyll 처리 비활성화

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
